# Magic Box Workflow Feature Development Ui Component Update

## Action

Follow the feature-development-ui-component-update workflow:
1. Modify or add files in src/components/ (e.g., new or updated component .tsx files)
2. Update or add corresponding test files (e.g., .test.tsx or .cy.tsx)
3. Update or add styles in src/global/styles.css or component-specific styles
4. Update related context or module files in src/contexts/ or src/modules/
5. Optionally update UI assets in public/ (e.g., icons, images)
6. Optionally update documentation (e.g., DEFERRED.md)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/components/**/*.tsx, src/components/**/*.test.tsx, src/components/**/*.cy.tsx

