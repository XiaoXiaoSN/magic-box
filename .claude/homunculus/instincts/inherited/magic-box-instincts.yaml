# Magic Box Workflow Bugfix Ui Or Style

## Action

Follow the bugfix-ui-or-style workflow:
1. Identify the UI component or page with the issue
2. Edit the relevant .tsx file(s) in src/components/ or src/pages/
3. Update src/global/styles.css if the fix involves CSS
4. Test the fix locally

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/components/**/*.tsx, src/pages/**/*.tsx, src/global/styles.css

